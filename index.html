<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up</title>
</head>
<body>
    <div class="right-side-container">
        <div class="sign-up-box">
            <form action="" method="post" id="sign-up-form">
                <fieldset id="form">
                    <legend>LETS DO THIS</legend>
                    <div class="grid-container">
                        <div class="grid-child">
                            <div class="inputs">
                                <label for="first-name-input">FIRST NAME</label>
                                <input type="text" name="first-name" id="first-name-input" placeholder="John" required>
                            </div>

                            <div class="inputs">
                                <label for="phone-input">PHONE NUMBER</label>
                                <input type="tel" name="phone-number" id="phone-input" placeholder="850-544-9999">
                            </div>
                            
                            <div class="inputs">
                                <label for="password-input">PASSWORD</label>
                                <input type="password" name="password" id="password-input" placeholder="Super Secret" required>
                            </div>
                        </div>
                        <div class="grid-child">
                            <div class="inputs">
                                <label for="last-name-input">LAST NAME</label>
                                <input type="text" name="last-name" id="last-name-input" placeholder="Doe" required>
                            </div>

                            <div class="inputs">
                                <label for="email-input">EMAIL</label>
                                <input type="email" name="email" id="email-input" placeholder="example@homehound.com" required>
                            </div>
                            
                            <div class="inputs">
                                <label for="password-conf-input">CONFIRM PASSWORD</label>
                                <input type="password" name="password-conf" id="password-conf-input" placeholder="Super Secret" required>
                            </div>
                        </div>
                    </div>
                </fieldset>
                <button type="submit" class="submit">CREATE ACCOUNT</button>
                <div class="divider"></div>
                <h3 id="terms">BY CLICKING SUBMIT YOU AGREE TO OUR TERMS AND CONDITIONS</h3>
            </form>
        </div>

        <a href="" id="sign-in">SIGN IN</a>
    </div>
    <div class="image-container">
        <div class="logo-container">
            <h2 id="the-tally">The Tally</h2>
            <h1 id="home-hound">HOME HOUND</h1>
        </div>
    </div>
</body>
</html>
